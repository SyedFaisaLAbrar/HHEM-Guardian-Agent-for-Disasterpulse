services:
  - type: web
    name: disasterpulse-api
    env: python
    buildCommand: pip install -r app/requirements.txt && python -m spacy download en_core_web_sm
    startCommand: sh -c 'cd app && uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "8000"
